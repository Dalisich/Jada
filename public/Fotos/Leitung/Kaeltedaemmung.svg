<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2040"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="30%" style="stop-color:#1e4570"/>
      <stop offset="60%" style="stop-color:#142e50"/>
      <stop offset="100%" style="stop-color:#0d2038"/>
    </linearGradient>
    <linearGradient id="insulGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e4a2e"/>
      <stop offset="35%" style="stop-color:#245c38"/>
      <stop offset="65%" style="stop-color:#163820"/>
      <stop offset="100%" style="stop-color:#0e2a16"/>
    </linearGradient>
    <filter id="fog">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="condensation" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a0d0f0;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a0d0f0;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <!-- Cold atmosphere particles -->
  <circle cx="100" cy="80" r="40" fill="#1040a0" opacity="0.08"/>
  <circle cx="700" cy="400" r="60" fill="#0060c0" opacity="0.1"/>
  <circle cx="600" cy="100" r="50" fill="#0080e0" opacity="0.07"/>
  <!-- Main insulated pipe (large) -->
  <!-- Insulation layer (kautschuk) -->
  <rect x="60" y="185" width="680" height="130" rx="65" fill="url(#insulGrad)"/>
  <!-- Surface texture -->
  <rect x="60" y="185" width="680" height="130" rx="65" fill="none" stroke="#2a6040" stroke-width="1.5" opacity="0.5"/>
  <!-- Inner pipe -->
  <rect x="80" y="210" width="640" height="80" rx="40" fill="url(#pipeGrad)"/>
  <rect x="80" y="210" width="640" height="80" rx="40" fill="none" stroke="#2050a0" stroke-width="1" opacity="0.6"/>
  <!-- Pipe highlight -->
  <rect x="80" y="210" width="640" height="25" rx="40" fill="#3060b0" opacity="0.3"/>
  <!-- Frost/condensation effect -->
  <circle cx="180" cy="220" r="4" fill="#c0e8ff" opacity="0.7"/>
  <circle cx="220" cy="235" r="3" fill="#c0e8ff" opacity="0.5"/>
  <circle cx="195" cy="248" r="5" fill="#c0e8ff" opacity="0.6"/>
  <circle cx="260" cy="225" r="3" fill="#c0e8ff" opacity="0.4"/>
  <circle cx="310" cy="218" r="4" fill="#c0e8ff" opacity="0.6"/>
  <circle cx="350" cy="240" r="3" fill="#c0e8ff" opacity="0.5"/>
  <circle cx="420" cy="222" r="5" fill="#c0e8ff" opacity="0.5"/>
  <circle cx="470" cy="238" r="3" fill="#c0e8ff" opacity="0.7"/>
  <circle cx="530" cy="225" r="4" fill="#c0e8ff" opacity="0.4"/>
  <circle cx="590" cy="242" r="3" fill="#c0e8ff" opacity="0.6"/>
  <!-- Cold vapor wisps -->
  <path d="M 150 185 Q 160 165 145 148 Q 130 132 145 115" stroke="#a0c8f0" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M 300 185 Q 315 162 305 140 Q 295 118 308 100" stroke="#a0c8f0" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M 500 315 Q 515 335 505 355 Q 495 375 510 395" stroke="#a0c8f0" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  <!-- Small pipe above -->
  <rect x="150" y="100" width="200" height="60" rx="30" fill="url(#insulGrad)" opacity="0.8"/>
  <rect x="158" y="115" width="184" height="32" rx="16" fill="url(#pipeGrad)" opacity="0.9"/>
  <!-- Label text -->
  <rect x="270" y="390" width="260" height="50" rx="12" fill="#050d18" opacity="0.7"/>
  <text x="400" y="411" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#60a0e0" text-anchor="middle" letter-spacing="2">KÄLTEDÄMMUNG</text>
  <text x="400" y="430" font-family="Arial, sans-serif" font-size="11" fill="#4080b0" text-anchor="middle">Synthetischer Kautschuk · PIR-Schalen</text>
  <!-- Temperature indicator -->
  <rect x="650" y="60" width="110" height="55" rx="10" fill="#050d18" opacity="0.75"/>
  <text x="705" y="84" font-family="Arial, sans-serif" font-size="11" fill="#4080c0" text-anchor="middle" font-weight="bold">BETRIEBSTEMP.</text>
  <text x="705" y="104" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#60b0f0" text-anchor="middle">−20°C</text>
</svg>

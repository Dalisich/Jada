<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="aluBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4d8dc"/>
      <stop offset="40%" style="stop-color:#e8eaec"/>
      <stop offset="60%" style="stop-color:#b8bcc0"/>
      <stop offset="100%" style="stop-color:#c8ccce"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15"/>
    </linearGradient>
    <pattern id="ridgePattern" x="0" y="0" width="40" height="400" patternUnits="userSpaceOnUse">
      <rect width="40" height="400" fill="url(#aluBase)"/>
      <rect x="0" width="3" height="400" fill="#c0c4c8" opacity="0.8"/>
      <rect x="3" width="14" height="400" fill="#e0e4e8" opacity="0.5"/>
      <rect x="17" width="3" height="400" fill="#a8acb0" opacity="0.6"/>
      <rect x="20" width="3" height="400" fill="#c0c4c8" opacity="0.8"/>
      <rect x="23" width="14" height="400" fill="#e0e4e8" opacity="0.5"/>
      <rect x="37" width="3" height="400" fill="#a8acb0" opacity="0.6"/>
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="#2a2e35"/>
  <!-- Pipe body -->
  <ellipse cx="300" cy="380" rx="220" ry="30" fill="#1a1e25" opacity="0.5"/>
  <rect x="80" y="80" width="440" height="280" rx="140" fill="url(#ridgePattern)" filter="url(#shadow)"/>
  <rect x="80" y="80" width="440" height="280" rx="140" fill="url(#sheen)"/>
  <!-- Seam lines -->
  <line x1="80" y1="220" x2="520" y2="220" stroke="#a0a4a8" stroke-width="1.5" opacity="0.6"/>
  <!-- Bolt/rivet details -->
  <circle cx="120" cy="160" r="6" fill="#b0b4b8" stroke="#909498" stroke-width="1"/>
  <circle cx="120" cy="280" r="6" fill="#b0b4b8" stroke="#909498" stroke-width="1"/>
  <circle cx="480" cy="160" r="6" fill="#b0b4b8" stroke="#909498" stroke-width="1"/>
  <circle cx="480" cy="280" r="6" fill="#b0b4b8" stroke="#909498" stroke-width="1"/>
  <!-- Label -->
  <rect x="200" y="340" width="200" height="36" rx="8" fill="#1a1e25" opacity="0.6"/>
  <text x="300" y="363" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c8d0d8" text-anchor="middle" letter-spacing="2">ALU-BLECH 0.6–1.0 mm</text>
</svg>

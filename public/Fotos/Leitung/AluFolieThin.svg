<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="thinAlu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e4e8"/>
      <stop offset="20%" style="stop-color:#f0f4f8"/>
      <stop offset="40%" style="stop-color:#c8ccd0"/>
      <stop offset="55%" style="stop-color:#f4f6f8"/>
      <stop offset="75%" style="stop-color:#d0d4d8"/>
      <stop offset="100%" style="stop-color:#b8bcc0"/>
    </linearGradient>
    <linearGradient id="mirrorSheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#ffffff;stop-opacity:0.6"/>
      <stop offset="35%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="70%" style="stop-color:#e0e4e8;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="topHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.5"/>
      <stop offset="30%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="70%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.25"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="pipeShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="#1c2028"/>
  <!-- Ground shadow -->
  <ellipse cx="300" cy="384" rx="205" ry="18" fill="#080c14" opacity="0.6"/>
  <!-- Pipe with mirror-like foil -->
  <rect x="90" y="80" width="420" height="278" rx="139" fill="url(#thinAlu)" filter="url(#pipeShadow)"/>
  <!-- Mirror-like horizontal shine -->
  <rect x="90" y="80" width="420" height="278" rx="139" fill="url(#mirrorSheen)"/>
  <!-- Top/bottom highlight -->
  <rect x="90" y="80" width="420" height="278" rx="139" fill="url(#topHighlight)"/>
  <!-- Thin horizontal crease lines typical of foil -->
  <line x1="100" y1="160" x2="500" y2="160" stroke="#d0d4d8" stroke-width="0.5" opacity="0.4"/>
  <line x1="102" y1="168" x2="498" y2="168" stroke="#f0f4f8" stroke-width="0.5" opacity="0.3"/>
  <line x1="98" y1="240" x2="502" y2="240" stroke="#c8ccd0" stroke-width="0.5" opacity="0.4"/>
  <line x1="100" y1="248" x2="500" y2="248" stroke="#e8ecf0" stroke-width="0.5" opacity="0.3"/>
  <!-- Thin vertical glint -->
  <rect x="240" y="80" width="8" height="278" rx="4" fill="#ffffff" opacity="0.15" filter="url(#glow)"/>
  <rect x="360" y="80" width="4" height="278" rx="2" fill="#ffffff" opacity="0.1"/>
  <!-- Border -->
  <rect x="90" y="80" width="420" height="278" rx="139" fill="none" stroke="#d8dcdf" stroke-width="1" opacity="0.5"/>
  <!-- Label -->
  <rect x="195" y="336" width="210" height="36" rx="8" fill="#080c14" opacity="0.65"/>
  <text x="300" y="354" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d8e0e8" text-anchor="middle" letter-spacing="2">ALU-FOLIE</text>
  <text x="300" y="368" font-family="Arial, sans-serif" font-size="10" fill="#8898a8" text-anchor="middle">Für Hohldecken &amp; unsichtbare Verläufe</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="pvcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a5f8a"/>
      <stop offset="30%" style="stop-color:#4a7ab0"/>
      <stop offset="60%" style="stop-color:#2d4f78"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="pvcSheen" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="30%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2"/>
    </linearGradient>
    <pattern id="wrapLines" x="0" y="0" width="600" height="18" patternUnits="userSpaceOnUse">
      <rect width="600" height="18" fill="transparent"/>
      <line x1="0" y1="0" x2="600" y2="0" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
      <line x1="0" y1="9" x2="600" y2="9" stroke="#000000" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="#1e2832"/>
  <!-- Shadow -->
  <ellipse cx="300" cy="385" rx="215" ry="22" fill="#0a1020" opacity="0.5"/>
  <!-- Pipe wrap -->
  <rect x="85" y="75" width="430" height="290" rx="145" fill="url(#pvcGrad)" filter="url(#softShadow)"/>
  <rect x="85" y="75" width="430" height="290" rx="145" fill="url(#wrapLines)"/>
  <rect x="85" y="75" width="430" height="290" rx="145" fill="url(#pvcSheen)"/>
  <!-- Overlap seam -->
  <path d="M 85 220 Q 300 210 515 220" stroke="#2d6090" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M 85 228 Q 300 218 515 228" stroke="#1a4060" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Surface detail - slight texture -->
  <rect x="85" y="75" width="430" height="290" rx="145" fill="none" stroke="#6090c0" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <rect x="195" y="338" width="210" height="36" rx="8" fill="#0a1020" opacity="0.7"/>
  <text x="300" y="356" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#90b8e0" text-anchor="middle" letter-spacing="2">PVC-FOLIE</text>
  <text x="300" y="369" font-family="Arial, sans-serif" font-size="10" fill="#6090b8" text-anchor="middle">Nicht UV-beständig</text>
</svg>

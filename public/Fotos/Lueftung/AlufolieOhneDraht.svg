<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101c30"/>
      <stop offset="100%" stop-color="#182840"/>
    </linearGradient>
    <!-- Mirror-like foil - very reflective -->
    <linearGradient id="foilMirror" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8d4e0"/>
      <stop offset="15%" stop-color="#f0f4f8"/>
      <stop offset="30%" stop-color="#dce6f0"/>
      <stop offset="50%" stop-color="#e8eff6"/>
      <stop offset="70%" stop-color="#ccd8e4"/>
      <stop offset="85%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#b8c8d8"/>
    </linearGradient>
    <linearGradient id="foilMirrorTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f8fc"/>
      <stop offset="25%" stop-color="#dce8f4"/>
      <stop offset="55%" stop-color="#e8f0f8"/>
      <stop offset="100%" stop-color="#b0c0d0"/>
    </linearGradient>
    <linearGradient id="foilSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#788898"/>
      <stop offset="100%" stop-color="#a8b8c8"/>
    </linearGradient>
    <linearGradient id="insul" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a060"/>
      <stop offset="100%" stop-color="#a07840"/>
    </linearGradient>
    <linearGradient id="insulSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a5828"/>
      <stop offset="100%" stop-color="#a07840"/>
    </linearGradient>
    <linearGradient id="duct" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#2d3748"/>
    </linearGradient>
    <!-- Highlight streak -->
    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Reflection shimmer -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="80%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#6080b0" stroke-width="1">
    <line x1="0" y1="100" x2="1600" y2="100"/>
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="500" x2="1600" y2="500"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="0" y1="900" x2="1600" y2="900"/>
    <line x1="200" y1="0" x2="200" y2="1000"/>
    <line x1="400" y1="0" x2="400" y2="1000"/>
    <line x1="600" y1="0" x2="600" y2="1000"/>
    <line x1="800" y1="0" x2="800" y2="1000"/>
    <line x1="1000" y1="0" x2="1000" y2="1000"/>
    <line x1="1200" y1="0" x2="1200" y2="1000"/>
    <line x1="1400" y1="0" x2="1400" y2="1000"/>
  </g>

  <!-- INSULATION LAYER -->
  <rect x="280" y="260" width="1040" height="440" rx="4" fill="url(#insul)" opacity="0.9"/>
  <polygon points="280,260 200,320 200,780 280,700" fill="url(#insulSide)" opacity="0.85"/>
  <rect x="280" y="700" width="1040" height="40" fill="#7a5828" opacity="0.6"/>

  <!-- FOIL LAYER - clean, no mesh, very mirror-like -->
  <!-- Main top face -->
  <rect x="300" y="278" width="1000" height="402" rx="2" fill="url(#foilMirrorTop)"/>
  <!-- Shimmer reflections across the foil -->
  <rect x="300" y="278" width="1000" height="402" fill="url(#shimmer)" opacity="0.8"/>
  <!-- Left face -->
  <polygon points="300,278 218,338 218,738 300,680" fill="url(#foilSide)"/>
  <!-- Bottom strip -->
  <rect x="300" y="680" width="1000" height="22" fill="#7888a0" opacity="0.9"/>

  <!-- Tape seam lines - clean and precise -->
  <!-- Longitudinal seams -->
  <line x1="300" y1="400" x2="1300" y2="400" stroke="#a0b0c0" stroke-width="3" opacity="0.7"/>
  <line x1="300" y1="560" x2="1300" y2="560" stroke="#a0b0c0" stroke-width="3" opacity="0.7"/>
  <!-- Tape strips at seams -->
  <rect x="300" y="395" width="1000" height="12" fill="#c8d8e8" opacity="0.55"/>
  <rect x="300" y="555" width="1000" height="12" fill="#c8d8e8" opacity="0.55"/>
  <!-- Seam highlight -->
  <rect x="300" y="395" width="1000" height="3" fill="white" opacity="0.4"/>
  <rect x="300" y="555" width="1000" height="3" fill="white" opacity="0.4"/>

  <!-- Cross seams (vertical) - tape wraps -->
  <line x1="580" y1="278" x2="580" y2="680" stroke="#a0b0c0" stroke-width="2.5" opacity="0.5"/>
  <line x1="860" y1="278" x2="860" y2="680" stroke="#a0b0c0" stroke-width="2.5" opacity="0.5"/>
  <line x1="1100" y1="278" x2="1100" y2="680" stroke="#a0b0c0" stroke-width="2.5" opacity="0.5"/>
  <!-- Tape around vertical seams -->
  <rect x="576" y="278" width="8" height="402" fill="#c8d8e8" opacity="0.4"/>
  <rect x="856" y="278" width="8" height="402" fill="#c8d8e8" opacity="0.4"/>
  <rect x="1096" y="278" width="8" height="402" fill="#c8d8e8" opacity="0.4"/>

  <!-- Top highlight streak -->
  <rect x="300" y="278" width="1000" height="60" fill="url(#highlight)" opacity="0.6"/>

  <!-- DUCT inner body -->
  <rect x="380" y="350" width="840" height="260" fill="url(#duct)"/>
  <polygon points="380,350 298,412 298,668 380,610" fill="#1e2a3a"/>
  <rect x="298" y="412" width="82" height="20" fill="#3a4a5a" opacity="0.8"/>

  <!-- Duct detail lines -->
  <line x1="380" y1="390" x2="1220" y2="390" stroke="#5a6880" stroke-width="1" opacity="0.4"/>
  <line x1="380" y1="570" x2="1220" y2="570" stroke="#5a6880" stroke-width="1" opacity="0.4"/>

  <!-- Glow from foil -->
  <rect x="300" y="278" width="1000" height="402" fill="none" stroke="rgba(200,220,240,0.3)" stroke-width="3" filter="url(#glow)"/>

  <!-- === INFO BADGE - no mesh icon === -->
  <circle cx="1480" cy="140" r="80" fill="rgba(255,255,255,0.04)" stroke="rgba(180,200,220,0.25)" stroke-width="2"/>
  <!-- "No mesh" crossed circle symbol -->
  <circle cx="1480" cy="132" r="42" fill="none" stroke="#8090a8" stroke-width="3"/>
  <line x1="1450" y1="102" x2="1510" y2="162" stroke="#8090a8" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Small hex inside (crossed out) -->
  <polygon points="1480,118 1492,125 1492,139 1480,146 1468,139 1468,125" fill="none" stroke="#6080a0" stroke-width="2" opacity="0.5"/>
  <text x="1480" y="236" font-family="Arial,sans-serif" font-size="17" fill="#8090a8" text-anchor="middle">Ohne Drahtgeflecht</text>

  <!-- Callout box -->
  <rect x="980" y="760" width="560" height="180" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(176,188,200,0.25)" stroke-width="1.5"/>
  <circle cx="1010" cy="800" r="7" fill="#f0f4f8"/>
  <text x="1028" y="806" font-family="Arial,sans-serif" font-size="22" fill="#c8d4e0" font-weight="600">Reinalufolie 2-lagig 2 × 0.02 mm</text>
  <circle cx="1010" cy="838" r="7" fill="none" stroke="#c0d0e0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="1028" y="844" font-family="Arial,sans-serif" font-size="22" fill="#8898a8">Kein Drahtgeflecht</text>
  <circle cx="1010" cy="876" r="7" fill="#c8a060"/>
  <text x="1028" y="882" font-family="Arial,sans-serif" font-size="22" fill="#8898a8">Isolierung (thermisch)</text>
  <circle cx="1010" cy="914" r="7" fill="#4a5568"/>
  <text x="1028" y="920" font-family="Arial,sans-serif" font-size="22" fill="#8898a8">Lüftungskanal</text>

  <!-- Title -->
  <rect x="60" y="40" width="420" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(180,200,220,0.18)" stroke-width="1"/>
  <text x="80" y="80" font-family="Arial,sans-serif" font-size="26" fill="#d0dce8" font-weight="700" letter-spacing="2">ALUFOLIE · Rein ohne Geflecht</text>

  <line x1="60" y1="960" x2="540" y2="960" stroke="#4a8cbf" stroke-width="2" opacity="0.4"/>
  <text x="60" y="985" font-family="Arial,sans-serif" font-size="18" fill="#6080a0">JADA · Lüftungsdämmung · Thermisch</text>
</svg>

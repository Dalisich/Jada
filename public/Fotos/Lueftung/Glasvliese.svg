<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1820"/>
      <stop offset="100%" stop-color="#181f2a"/>
    </linearGradient>
    <!-- Dark black/charcoal glasvlies surface -->
    <linearGradient id="vlies" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2e34"/>
      <stop offset="40%" stop-color="#1e2228"/>
      <stop offset="100%" stop-color="#14181e"/>
    </linearGradient>
    <linearGradient id="vliesSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e1014"/>
      <stop offset="100%" stop-color="#1e2228"/>
    </linearGradient>
    <linearGradient id="insul" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a060"/>
      <stop offset="100%" stop-color="#a07840"/>
    </linearGradient>
    <linearGradient id="insulSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a5828"/>
      <stop offset="100%" stop-color="#a07840"/>
    </linearGradient>
    <linearGradient id="duct" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#2d3748"/>
    </linearGradient>
    <!-- Glass fiber weave pattern - fine grid -->
    <pattern id="weaveH" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="none"/>
      <line x1="0" y1="0" x2="12" y2="0" stroke="#3a4048" stroke-width="1.2"/>
      <line x1="0" y1="6" x2="12" y2="6" stroke="#343840" stroke-width="0.8" opacity="0.6"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#3a4048" stroke-width="1.2"/>
      <line x1="6" y1="0" x2="6" y2="12" stroke="#343840" stroke-width="0.8" opacity="0.6"/>
    </pattern>
    <!-- Fiber shimmer pattern -->
    <pattern id="fiberShimmer" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <ellipse cx="10" cy="10" rx="8" ry="2" fill="none" stroke="rgba(100,110,120,0.15)" stroke-width="1" transform="rotate(30 10 10)"/>
      <ellipse cx="30" cy="25" rx="8" ry="2" fill="none" stroke="rgba(100,110,120,0.12)" stroke-width="1" transform="rotate(-20 30 25)"/>
    </pattern>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Very subtle grid -->
  <g opacity="0.04" stroke="#5070a0" stroke-width="1">
    <line x1="0" y1="100" x2="1600" y2="100"/>
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="500" x2="1600" y2="500"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="0" y1="900" x2="1600" y2="900"/>
    <line x1="200" y1="0" x2="200" y2="1000"/>
    <line x1="400" y1="0" x2="400" y2="1000"/>
    <line x1="600" y1="0" x2="600" y2="1000"/>
    <line x1="800" y1="0" x2="800" y2="1000"/>
    <line x1="1000" y1="0" x2="1000" y2="1000"/>
    <line x1="1200" y1="0" x2="1200" y2="1000"/>
    <line x1="1400" y1="0" x2="1400" y2="1000"/>
  </g>

  <!-- INSULATION LAYER -->
  <rect x="280" y="260" width="1040" height="440" rx="4" fill="url(#insul)" opacity="0.9"/>
  <polygon points="280,260 200,320 200,780 280,700" fill="url(#insulSide)" opacity="0.85"/>
  <rect x="280" y="700" width="1040" height="40" fill="#7a5828" opacity="0.6"/>

  <!-- GLASVLIES LAYER - dark charcoal/black -->
  <!-- Main top face -->
  <rect x="300" y="278" width="1000" height="402" rx="2" fill="url(#vlies)"/>
  <!-- Woven texture overlay -->
  <rect x="300" y="278" width="1000" height="402" fill="url(#weaveH)" opacity="0.85"/>
  <!-- Subtle fiber shimmer -->
  <rect x="300" y="278" width="1000" height="402" fill="url(#fiberShimmer)" opacity="1"/>
  <!-- Left face -->
  <polygon points="300,278 218,338 218,738 300,680" fill="url(#vliesSide)"/>
  <rect x="218" y="338" width="82" height="400" fill="url(#weaveH)" opacity="0.3"/>
  <!-- Bottom strip -->
  <rect x="300" y="680" width="1000" height="22" fill="#0e1014" opacity="0.9"/>

  <!-- Seam lines on vlies surface -->
  <line x1="300" y1="420" x2="1300" y2="420" stroke="#404850" stroke-width="3" opacity="0.7"/>
  <line x1="300" y1="540" x2="1300" y2="540" stroke="#404850" stroke-width="3" opacity="0.7"/>
  <line x1="580" y1="278" x2="580" y2="680" stroke="#404850" stroke-width="2.5" opacity="0.5"/>
  <line x1="860" y1="278" x2="860" y2="680" stroke="#404850" stroke-width="2.5" opacity="0.5"/>
  <line x1="1100" y1="278" x2="1100" y2="680" stroke="#404850" stroke-width="2.5" opacity="0.5"/>

  <!-- Subtle gloss highlight at top edge (catching light) -->
  <rect x="300" y="278" width="1000" height="20" fill="rgba(100,110,120,0.12)"/>
  <rect x="300" y="278" width="1000" height="4" fill="rgba(120,130,140,0.2)"/>

  <!-- Optional: black edging tape strips at seams -->
  <rect x="300" y="416" width="1000" height="10" fill="rgba(50,55,60,0.8)"/>
  <rect x="300" y="536" width="1000" height="10" fill="rgba(50,55,60,0.8)"/>

  <!-- DUCT inner body -->
  <rect x="380" y="350" width="840" height="260" fill="url(#duct)"/>
  <polygon points="380,350 298,412 298,668 380,610" fill="#1e2a3a"/>
  <rect x="298" y="412" width="82" height="20" fill="#3a4a5a" opacity="0.8"/>

  <!-- === ZOOM DETAIL - top right === -->
  <circle cx="1480" cy="140" r="90" fill="rgba(10,14,20,0.8)" stroke="rgba(80,90,100,0.4)" stroke-width="2"/>
  <!-- Zoomed weave pattern -->
  <g clip-path="url(#circleClip)">
    <g transform="translate(1390,50)">
      <!-- Dense weave grid zoom -->
      <g opacity="0.95">
        <line x1="0" y1="20" x2="180" y2="20" stroke="#4a5258" stroke-width="3"/>
        <line x1="0" y1="40" x2="180" y2="40" stroke="#404850" stroke-width="2.5"/>
        <line x1="0" y1="60" x2="180" y2="60" stroke="#4a5258" stroke-width="3"/>
        <line x1="0" y1="80" x2="180" y2="80" stroke="#404850" stroke-width="2.5"/>
        <line x1="0" y1="100" x2="180" y2="100" stroke="#4a5258" stroke-width="3"/>
        <line x1="0" y1="120" x2="180" y2="120" stroke="#404850" stroke-width="2.5"/>
        <line x1="0" y1="140" x2="180" y2="140" stroke="#4a5258" stroke-width="3"/>
        <line x1="0" y1="160" x2="180" y2="160" stroke="#404850" stroke-width="2.5"/>
        <line x1="0" y1="180" x2="180" y2="180" stroke="#4a5258" stroke-width="3"/>
        <line x1="20" y1="0" x2="20" y2="190" stroke="#4a5258" stroke-width="3"/>
        <line x1="40" y1="0" x2="40" y2="190" stroke="#404850" stroke-width="2.5"/>
        <line x1="60" y1="0" x2="60" y2="190" stroke="#4a5258" stroke-width="3"/>
        <line x1="80" y1="0" x2="80" y2="190" stroke="#404850" stroke-width="2.5"/>
        <line x1="100" y1="0" x2="100" y2="190" stroke="#4a5258" stroke-width="3"/>
        <line x1="120" y1="0" x2="120" y2="190" stroke="#404850" stroke-width="2.5"/>
        <line x1="140" y1="0" x2="140" y2="190" stroke="#4a5258" stroke-width="3"/>
        <line x1="160" y1="0" x2="160" y2="190" stroke="#404850" stroke-width="2.5"/>
      </g>
    </g>
  </g>
  <text x="1480" y="252" font-family="Arial,sans-serif" font-size="17" fill="#7080a0" text-anchor="middle">Detail: Glasvlies-Gewebe</text>

  <!-- Color swatch - available colors note -->
  <rect x="60" y="760" width="340" height="140" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(100,120,140,0.2)" stroke-width="1.5"/>
  <text x="80" y="790" font-family="Arial,sans-serif" font-size="19" fill="#8090a0" font-weight="600">Verfügbare Farben</text>
  <rect x="80" y="805" width="36" height="24" rx="4" fill="#1a1e24"/>
  <text x="124" y="822" font-family="Arial,sans-serif" font-size="16" fill="#7080a0">Schwarz (Standard)</text>
  <rect x="80" y="840" width="36" height="24" rx="4" fill="#a8a8a8"/>
  <text x="124" y="857" font-family="Arial,sans-serif" font-size="16" fill="#7080a0">Eingefärbt (auf Anfrage)</text>
  <rect x="80" y="875" width="36" height="24" rx="4" fill="#b8c4cc"/>
  <text x="124" y="892" font-family="Arial,sans-serif" font-size="16" fill="#7080a0">Alubedampft (optional)</text>

  <!-- Callout box -->
  <rect x="980" y="760" width="560" height="180" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(100,120,140,0.2)" stroke-width="1.5"/>
  <circle cx="1010" cy="800" r="7" fill="#2a2e34"/>
  <text x="1028" y="806" font-family="Arial,sans-serif" font-size="22" fill="#c0ccd8" font-weight="600">Glasvlies-Gewebe (schwarz)</text>
  <circle cx="1010" cy="838" r="7" fill="#c8a060"/>
  <text x="1028" y="844" font-family="Arial,sans-serif" font-size="22" fill="#8090a0">Isolierung (thermisch)</text>
  <circle cx="1010" cy="876" r="7" fill="#4a5568"/>
  <text x="1028" y="882" font-family="Arial,sans-serif" font-size="22" fill="#8090a0">Lüftungskanal</text>
  <circle cx="1010" cy="914" r="6" fill="none" stroke="#6080a0" stroke-width="1.5"/>
  <text x="1028" y="920" font-family="Arial,sans-serif" font-size="22" fill="#8090a0">Ideal für Sichtdecken / Ladenbau</text>

  <!-- Title -->
  <rect x="60" y="40" width="320" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(100,130,160,0.18)" stroke-width="1"/>
  <text x="80" y="80" font-family="Arial,sans-serif" font-size="26" fill="#c8d4e0" font-weight="700" letter-spacing="2">GLASVLIESE · Textile Umhüllung</text>

  <line x1="60" y1="960" x2="540" y2="960" stroke="#4a8cbf" stroke-width="2" opacity="0.35"/>
  <text x="60" y="985" font-family="Arial,sans-serif" font-size="18" fill="#5070a0">JADA · Lüftungsdämmung · Sichtqualität</text>
</svg>
